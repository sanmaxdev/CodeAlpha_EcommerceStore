<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product - Loomwell</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>" />
  <script>document.documentElement.dataset.theme=localStorage.getItem('loomwell_theme')||'light';</script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="app-header"></div>

  <main class="wrap">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/index.html">Shop</a>
      <span class="sep">/</span>
      <span id="crumb-name" class="muted">Product</span>
    </nav>

    <section class="detail" id="detail-root">
      <!-- skeleton while loading -->
      <div class="skeleton" style="aspect-ratio:1/1;border-radius:var(--r-lg)"></div>
      <div>
        <div class="skeleton sk-line" style="width:30%;margin-left:0"></div>
        <div class="skeleton sk-line" style="height:34px;width:70%;margin-left:0"></div>
        <div class="skeleton sk-line" style="width:40%;margin-left:0"></div>
        <div class="skeleton sk-line" style="height:90px;margin-left:0"></div>
      </div>
    </section>

    <section class="section" id="related-section">
      <div class="section-head"><h2>You might also like</h2></div>
      <div class="product-grid" id="related-grid"></div>
    </section>
  </main>

  <div id="app-footer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/product.js"></script>
</body>
</html>
