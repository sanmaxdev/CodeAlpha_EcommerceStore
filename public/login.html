<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in - Loomwell</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>" />
  <script>document.documentElement.dataset.theme=localStorage.getItem('loomwell_theme')||'light';</script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="app-header"></div>

  <main class="wrap">
    <div class="form-narrow">
      <div class="panel">
        <h1>Welcome back</h1>
        <p class="sub">Log in to check out and track your orders.</p>

        <div class="alert" id="auth-alert"></div>

        <form id="auth-form" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required />
          </div>
          <button class="btn btn-primary btn-block btn-lg" type="submit" id="auth-submit">Log in</button>
        </form>

        <div class="form-foot">
          New here? <a href="/register.html">Create an account</a>
        </div>
        <div class="form-foot" style="margin-top:14px;font-size:.82rem;color:var(--faint)">
          Demo account: demo@loomwell.co / demo1234
        </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script>window.AUTH_MODE = 'login';</script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
