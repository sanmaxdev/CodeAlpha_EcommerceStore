<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account - Loomwell</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>" />
  <script>document.documentElement.dataset.theme=localStorage.getItem('loomwell_theme')||'light';</script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="app-header"></div>

  <main class="wrap">
    <div class="form-narrow">
      <div class="panel">
        <h1>Create your account</h1>
        <p class="sub">It takes a few seconds and lets you place orders.</p>

        <div class="alert" id="auth-alert"></div>

        <form id="auth-form" novalidate>
          <div class="field">
            <label for="name">Full name</label>
            <input id="name" name="name" autocomplete="name" placeholder="Riya Sharma" required />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required />
            <span class="hint">Use 6 or more characters.</span>
          </div>
          <button class="btn btn-primary btn-block btn-lg" type="submit" id="auth-submit">Create account</button>
        </form>

        <div class="form-foot">
          Already have an account? <a href="/login.html">Log in</a>
        </div>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>

  <script>window.AUTH_MODE = 'register';</script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
